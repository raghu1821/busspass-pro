<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0" />
  <style>
    .error-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 2rem; }
    .error-code { font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; line-height: 1; background: linear-gradient(135deg, #ff4d6d, #ff8c42); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-icon { font-size: 4rem; margin-bottom: 1rem; animation: shake 0.5s infinite alternate; }
    .error-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    .error-subtitle { color: var(--text-secondary); max-width: 420px; margin: 0 auto 2rem; line-height: 1.6; }
    @keyframes shake { from{transform:rotate(-3deg)} to{transform:rotate(3deg)} }
  </style>
</head>
<body>
  <div class="error-wrapper animate-fade-up">
    <div class="error-icon">⚙️</div>
    <div class="error-code">500</div>
    <h1 class="error-title">Internal Server Error</h1>
    <p class="error-subtitle">Something went wrong on our end. Our team has been notified. Please try again in a moment.</p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
      <a href="/" class="btn btn-primary btn-lg">🏠 Go Home</a>
      <a href="javascript:location.reload()" class="btn btn-ghost btn-lg">🔄 Try Again</a>
    </div>
  </div>
  <script src="/static/theme.js"></script>
</body>
</html>
