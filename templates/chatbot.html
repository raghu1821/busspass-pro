<!-- Chatbot Widget -->
<style>
  /* Chatbot styles */
  .chatbot-toggler {
    position: fixed;
    bottom: 30px;
    right: 30px;
    outline: none;
    border: none;
    height: 55px;
    width: 55px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(37,99,235,0.4), 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 9999;
  }

  .chatbot-toggler:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(37,99,235,0.6), 0 8px 15px rgba(0,0,0,0.3);
  }

  .chatbot-toggler i {
    font-size: 1.5rem;
    position: absolute;
    transition: opacity 0.2s;
  }

  .chatbot-toggler .lucide-x {
    opacity: 0;
  }

  .show-chatbot .chatbot-toggler .lucide-message-circle {
    opacity: 0;
  }

  .show-chatbot .chatbot-toggler .lucide-x {
    opacity: 1;
  }

  .chatbot-window {
    position: fixed;
    right: 35px;
    bottom: 100px;
    width: 380px;
    max-width: calc(100vw - 40px);
    background: var(--bg-card, #0d1117);
    border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
    border-radius: var(--radius-lg, 16px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    overflow: hidden;
    transform: scale(0.5);
    opacity: 0;
    pointer-events: none;
    transform-origin: bottom right;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9998;
    display: flex;
    flex-direction: column;
    height: 500px;
    max-height: calc(100vh - 120px);
  }

  .show-chatbot .chatbot-window {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }

  .chat-header {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    padding: 16px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .chat-header p {
    margin: 0;
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .chat-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: rgba(255,255,255,0.02);
  }

  .chat-body::-webkit-scrollbar {
    width: 6px;
  }
  .chat-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }

  .chat-msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
  }

  .msg-bot {
    align-self: flex-start;
  }

  .msg-user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .msg-bot .msg-bubble {
    background: rgba(255,255,255,0.08);
    color: var(--text-primary, #fff);
    border-bottom-left-radius: 4px;
  }

  .msg-user .msg-bubble {
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .chat-input-area {
    padding: 15px;
    border-top: 1px solid var(--glass-border, rgba(255,255,255,0.1));
    display: flex;
    gap: 10px;
    background: var(--bg-card, #0d1117);
  }

  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary, #fff);
    padding: 12px 16px;
    border-radius: 20px;
    outline: none;
    font-size: 0.95rem;
    transition: border-color 0.2s;
  }

  .chat-input:focus {
    border-color: #2563eb;
  }

  .chat-send-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .chat-send-btn:hover {
    background: #1d4ed8;
    transform: scale(1.05);
  }

  .chat-send-btn:disabled {
    background: rgba(255,255,255,0.1);
    cursor: not-allowed;
    transform: none;
  }
  
  @media print {
    .chatbot-toggler, .chatbot-window {
      display: none !important;
    }
  }
</style>

<!-- Load Lucide icons if not already loaded -->
<script src="https://unpkg.com/lucide@latest"></script>

<button class="chatbot-toggler" id="chat-toggler">
  <i data-lucide="message-circle" class="lucide-message-circle"></i>
  <i data-lucide="x" class="lucide-x"></i>
</button>

<div class="chatbot-window">
  <div class="chat-header">
    <div class="chat-avatar">🤖</div>
    <div>
      <h2>BusPass Assistant</h2>
      <p>Online &bull; Ready to help</p>
    </div>
  </div>
  
  <div class="chat-body" id="chat-body">
    <!-- Initial greeting -->
    <div class="chat-msg msg-bot">
      <div class="msg-bubble">
        👋 Hi there! I'm the BusPass Assistant. How can I help you today?<br><br>
        <i>You can ask me about:<br>• Payments<br>• Applying for a pass<br>• Printing/PDFs<br>• Photo issues</i>
      </div>
    </div>
  </div>
  
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off">
    <button class="chat-send-btn" id="chat-send-btn" disabled>
      <i data-lucide="send" style="width:18px;height:18px;"></i>
    </button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
    
    const chatToggler = document.getElementById('chat-toggler');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send-btn');
    const chatBody = document.getElementById('chat-body');

    // Toggle chat window
    chatToggler.addEventListener('click', () => {
      document.body.classList.toggle('show-chatbot');
      if(document.body.classList.contains('show-chatbot')) {
        setTimeout(() => chatInput.focus(), 300);
      }
    });

    // Enable/disable send button
    chatInput.addEventListener('input', () => {
      sendBtn.disabled = chatInput.value.trim() === '';
    });

    // Handle Enter key
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim() !== '') {
        handleChatSubmit();
      }
    });

    sendBtn.addEventListener('click', () => {
      handleChatSubmit();
    });

    function handleChatSubmit() {
      const msg = chatInput.value.trim();
      if (!msg) return;

      // Add user message
      appendMessage(msg, 'msg-user');
      chatInput.value = '';
      sendBtn.disabled = true;

      // Simulate typing delay
      setTimeout(() => {
        const response = generateBotResponse(msg);
        appendMessage(response, 'msg-bot');
      }, 600 + Math.random() * 600);
    }

    function appendMessage(text, className) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `chat-msg ${className}`;
      msgDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
      chatBody.appendChild(msgDiv);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function generateBotResponse(input) {
      const text = input.toLowerCase();
      
      if (text.includes('pay') || text.includes('payment') || text.includes('money') || text.includes('fail') || text.includes('error')) {
        return "💳 <b>Payments:</b> If your payment failed, don't worry! Our simulated gateway lets you retry instantly. If it keeps failing, please contact your bank.";
      }
      else if (text.includes('print') || text.includes('pdf') || text.includes('download')) {
        return "🖨️ <b>Printing:</b> To print your pass or save it as a PDF, go to 'My Pass' and click the 'Print Pass' button at the bottom. It will automatically flatten the 3D card for perfect printing!";
      }
      else if (text.includes('photo') || text.includes('picture') || text.includes('image') || text.includes('qr')) {
        return "🖼️ <b>Photos & QR:</b> Your photo and QR code are securely stored directly in our database. If they ever stop loading, simply refresh the page or try re-uploading your photo in Edit Profile.";
      }
      else if (text.includes('apply') || text.includes('new pass') || text.includes('route')) {
        return "📝 <b>Applying:</b> You can apply for a new pass by clicking 'Apply' in the navigation menu. Note that you can only apply if you don't already have an active pass!";
      }
      else if (text.includes('approve') || text.includes('pending') || text.includes('reject') || text.includes('status')) {
        return "⏳ <b>Approvals:</b> After you apply, an Admin must review your details. You will receive an email notification once your pass is approved or rejected.";
      }
      else if (text.includes('hi') || text.includes('hello') || text.includes('hey')) {
        return "Hello again! How can I assist you with BusPass Pro today?";
      }
      else if (text.includes('thank') || text.includes('thx')) {
        return "You're very welcome! Let me know if you need anything else. 😊";
      }
      else {
        return "I'm a simple bot and didn't quite catch that. You can always use the <b>Feedback</b> page to send a direct message to our human admins!";
      }
    }
  });
</script>
