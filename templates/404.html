<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .error-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 2rem; }
    .error-code { font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-icon { font-size: 4rem; margin-bottom: 1rem; animation: bounce 2s infinite; }
    .error-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    .error-subtitle { color: var(--text-secondary); max-width: 420px; margin: 0 auto 2rem; line-height: 1.6; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  </style>
</head>
<body>
  <div class="error-wrapper animate-fade-up">
    <div class="error-icon">🗺️</div>
    <div class="error-code">404</div>
    <h1 class="error-title">Oops! Page Not Found</h1>
    <p class="error-subtitle">Looks like this bus route doesn't exist. The page you're looking for may have been moved or deleted.</p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
      <a href="/" class="btn btn-primary btn-lg">🏠 Go Home</a>
      <a href="/dashboard" class="btn btn-ghost btn-lg">📊 Dashboard</a>
    </div>
  </div>
  <script src="/static/theme.js"></script>
</body>
</html>
