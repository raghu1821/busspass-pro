<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .pwd-card {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }
    .pwd-icon-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .pwd-icon-circle {
      width: 72px; height: 72px;
      background: var(--gradient-btn);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: var(--glow-blue);
    }
    .pwd-icon-header h2 { font-size: 1.4rem; margin-bottom: 4px; }
    .pwd-icon-header p  { font-size: 0.88rem; color: var(--text-secondary); }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--glass-border);
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
    .strength-label {
      font-size: 0.75rem;
      margin-top: 4px;
      color: var(--text-muted);
    }
    .pwd-footer {
      display: flex;
      gap: 10px;
      margin-top: 0.5rem;
    }
    .pwd-footer .btn { flex: 1; justify-content: center; }
    .match-msg {
      font-size: 0.75rem;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  {% include 'navbar.html' %}

  <div class="page-wrapper">
    <div class="page-header animate-fade-up">
      <div class="page-title">🔐 Security</div>
      <div class="page-subtitle">Manage your account password</div>
    </div>

    <div class="pwd-card animate-fade-up animate-delay-1">
      <div class="pwd-icon-header">
        <div class="pwd-icon-circle">🔐</div>
        <h2>Change Password</h2>
        <p>Choose a strong password to keep your account safe</p>
      </div>

      <form method="POST" id="pwdForm">

        <div class="form-group">
          <label class="form-label">🔑 Current Password</label>
          <input type="password" name="old_password" id="oldPwd"
            class="form-control" placeholder="Enter your current password" required />
        </div>

        <div class="form-group">
          <label class="form-label">🔒 New Password</label>
          <input type="password" name="new_password" id="newPwd"
            class="form-control" placeholder="Create a strong password" required
            oninput="updateStrength(this.value)" />
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel">Enter a password to check strength</div>
        </div>

        <div class="form-group">
          <label class="form-label">🔒 Confirm New Password</label>
          <input type="password" id="confirmPwd"
            class="form-control" placeholder="Re-enter your new password" required
            oninput="checkMatch()" />
          <div class="match-msg" id="matchMsg"></div>
        </div>

        <div class="pwd-footer">
          <button type="submit" class="btn btn-primary" id="submitBtn">✅ Update Password</button>
          <a href="/profile" class="btn btn-ghost">← Back</a>
        </div>

      </form>
    </div>
  </div>

  <script>
    function updateStrength(pwd) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (pwd.length >= 8)  score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const levels = [
        { pct: '0%',   color: 'transparent', text: 'Enter a password to check strength' },
        { pct: '25%',  color: '#ef4444',     text: '⚠️ Weak' },
        { pct: '50%',  color: '#f59e0b',     text: '🔶 Fair' },
        { pct: '75%',  color: '#3b82f6',     text: '🔷 Good' },
        { pct: '100%', color: '#10b981',     text: '✅ Strong' },
      ];
      const lvl = levels[score];
      fill.style.width = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color = lvl.color;
    }

    function checkMatch() {
      const np  = document.getElementById('newPwd').value;
      const cp  = document.getElementById('confirmPwd').value;
      const msg = document.getElementById('matchMsg');
      msg.style.display = 'block';
      if (cp === '') { msg.style.display = 'none'; return; }
      if (np === cp) {
        msg.textContent = '✅ Passwords match';
        msg.style.color = '#10b981';
      } else {
        msg.textContent = '❌ Passwords do not match';
        msg.style.color = '#ef4444';
      }
    }

    document.getElementById('pwdForm').addEventListener('submit', function(e) {
      const np = document.getElementById('newPwd').value;
      const cp = document.getElementById('confirmPwd').value;
      if (np !== cp) {
        e.preventDefault();
        alert('New passwords do not match. Please re-enter.');
      }
    });
  </script>
</body>
</html>
