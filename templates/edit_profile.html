<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0" />
  <style>
    .edit-card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }
    .edit-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }
    .edit-icon {
      width: 52px; height: 52px;
      background: var(--gradient-btn);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .edit-header h2 { font-size: 1.4rem; margin-bottom: 2px; }
    .edit-header p  { font-size: 0.85rem; color: var(--text-secondary); }
    .upload-zone {
      border: 2px dashed var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
    .upload-zone .up-icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-zone input[type="file"] { display: none; }
    .form-actions { display: flex; gap: 10px; margin-top: 0.5rem; }
    .form-actions .btn { flex: 1; justify-content: center; }
  </style>
</head>
<body>
  {% include 'navbar.html' %}

  <div class="page-wrapper">
    <div class="page-header animate-fade-up">
      <div class="page-title">✏️ Edit Profile</div>
      <div class="page-subtitle">Update your contact information and photo</div>
    </div>

    <div class="edit-card animate-fade-up animate-delay-1">
      <div class="edit-header">
        <div class="edit-icon">✏️</div>
        <div>
          <h2>Edit Profile</h2>
          <p>Make changes to your account details below</p>
        </div>
      </div>

      <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
          <label class="form-label">📞 Phone Number</label>
            <input
              type="tel" name="phone" id="phone" class="form-control"
              value="{{ data.phone }}" required
            />
            <div id="phone-error" style="color:var(--danger); font-size:0.75rem; margin-top:4px; display:none;">Invalid phone number</div>
        </div>

        <div class="form-group">
          <label class="form-label">🏠 Address</label>
          <textarea name="address" class="form-control" rows="3"
            placeholder="Your full address" required>{{ data.address }}</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">📷 Profile Photo <span style="color:var(--text-muted);font-weight:400;">(optional, leave blank to keep current)</span></label>
          <label class="upload-zone" for="photo-input">
            <div class="up-icon">📷</div>
            <div id="file-name">Click to upload new photo</div>
            <div style="font-size:0.75rem; margin-top:4px;">PNG, JPG up to 5MB</div>
            <input type="file" id="photo-input" name="photo" accept="image/*"
              onchange="document.getElementById('file-name').textContent = this.files[0]?.name || 'Click to upload new photo'" />
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">💾 Save Changes</button>
          <a href="/profile" class="btn btn-ghost">✕ Cancel</a>
        </div>

      </form>
    </div>
  </div>
  <!-- intl-tel-input library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>
  
  <style>
    .iti { width: 100%; }
    .iti__country-list { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); }
    .iti__country-list .iti__country.iti__highlight { background: rgba(255,255,255,0.05); }
    .iti__search-input { background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); }
    .iti__flag-container { padding: 2px; }
  </style>

  <script>
    const phoneInput = document.querySelector("#phone");
    const errorMsg = document.querySelector("#phone-error");
    const form = document.querySelector("form");

    const iti = window.intlTelInput(phoneInput, {
      initialCountry: "auto",
      geoIpLookup: callback => {
        fetch("https://ipapi.co/json")
          .then(res => res.json())
          .then(data => callback(data.country_code))
          .catch(() => callback("in"));
      },
      utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js",
      strictMode: true,
      separateDialCode: true,
    });

    form.addEventListener("submit", function(e) {
      if (phoneInput.value.trim() && !iti.isValidNumber()) {
        e.preventDefault();
        errorMsg.style.display = "block";
        phoneInput.style.borderColor = "var(--danger)";
      } else {
        errorMsg.style.display = "none";
        phoneInput.value = iti.getNumber();
      }
    });

    phoneInput.addEventListener('input', () => {
      errorMsg.style.display = "none";
      phoneInput.style.borderColor = "rgba(255, 255, 255, 0.15)";
    });
  </script>
</body>
</html>
