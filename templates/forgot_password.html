<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0"/>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card animate-fade-up" style="max-width:440px">
      <div class="auth-logo">🔐</div>
      <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:.35rem">Forgot Password?</h1>
      <p style="color:var(--text-secondary);margin-bottom:1.75rem;font-size:.92rem">Enter your registered email and we'll send you a 6-digit OTP to reset your password.</p>

      <form method="POST" action="/forgot_password">
        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">Send OTP →</button>
      </form>

      <div class="separator" style="margin:1.5rem 0"></div>
      <p style="text-align:center;color:var(--text-secondary);font-size:.9rem">
        Remembered it? <a href="/login" style="color:var(--accent);font-weight:600">Back to Login</a>
      </p>
    </div>
  </div>
  <script src="/static/toast.js"></script>
  <script src="/static/theme.js"></script>
</body>
</html>
