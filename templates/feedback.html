<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .feedback-card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }
    .fb-icon-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .fb-icon-circle {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(245,158,11,0.3);
    }
    .fb-icon-header h2 { font-size: 1.4rem; margin-bottom: 4px; }
    .fb-icon-header p  { font-size: 0.88rem; color: var(--text-secondary); }
    .topic-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .topic-chip {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .topic-chip:hover,
    .topic-chip.active {
      background: rgba(79,142,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .char-counter {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .char-counter.warn { color: var(--warning); }
  </style>
</head>
<body>
  {% include 'navbar.html' %}

  <div class="page-wrapper">
    <div class="page-header animate-fade-up">
      <div class="page-title">💬 Feedback</div>
      <div class="page-subtitle">Help us improve your experience</div>
    </div>

    <div class="feedback-card animate-fade-up animate-delay-1">
      <div class="fb-icon-header">
        <div class="fb-icon-circle">💬</div>
        <h2>Send Feedback</h2>
        <p>We value your thoughts — every message is read by our team</p>
      </div>

      <form method="POST" id="feedbackForm">
        <input type="hidden" name="topic" id="topicInput" value="General" />

        <!-- Quick Topic Chips -->
        <div class="form-group">
          <label class="form-label">📌 Topic</label>
          <div class="topic-chips">
            <span class="topic-chip active" onclick="setTopic(this, 'General')">💡 General</span>
            <span class="topic-chip" onclick="setTopic(this, 'Technical')">🔧 Technical</span>
            <span class="topic-chip" onclick="setTopic(this, 'Suggestion')">✨ Suggestion</span>
            <span class="topic-chip" onclick="setTopic(this, 'Complaint')">⚠️ Complaint</span>
          </div>
        </div>

        <!-- Message -->
        <div class="form-group">
          <label class="form-label">✍️ Your Message</label>
          <textarea
            name="message"
            id="msgArea"
            class="form-control"
            rows="5"
            maxlength="500"
            placeholder="Describe your experience, report an issue, or share a suggestion..."
            required
            oninput="updateCounter(this)"
          ></textarea>
          <div class="char-counter" id="charCounter">0 / 500</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          🚀 Submit Feedback
        </button>
      </form>
    </div>
  </div>

  <script>
    function setTopic(el, topic) {
      document.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('topicInput').value = topic;
    }

    function updateCounter(textarea) {
      const len = textarea.value.length;
      const counter = document.getElementById('charCounter');
      counter.textContent = `${len} / 500`;
      counter.classList.toggle('warn', len > 400);
    }
  </script>
</body>
</html>
