<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0" />
  <style>
    .auth-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(80px); opacity: 0.12;
    }
    .auth-orb-1 { width: 500px; height: 500px; background: var(--accent);   top: -150px; right: -100px; }
    .auth-orb-2 { width: 350px; height: 350px; background: var(--accent-2); bottom: -80px; left: -60px; }
    .reg-card {
      width: 100%; max-width: 580px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 1;
      margin: 0 auto;
    }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:600px){ .field-grid { grid-template-columns: 1fr; } }
    .photo-upload-label {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px dashed var(--glass-border); border-radius: var(--radius-md);
      padding: 1.2rem; cursor: pointer; transition: var(--transition); text-align: center;
      color: var(--text-muted); font-size: 0.85rem; gap: 6px;
    }
    .photo-upload-label:hover { border-color: var(--accent); color: var(--accent); }
    .photo-upload-label .upload-icon { font-size: 1.8rem; }
    #photo { display: none; }
  </style>
</head>
<body>
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <div class="auth-wrapper" style="padding: 2rem 1rem; align-items: flex-start; min-height:100vh; display:flex; justify-content:center;">
    <div class="reg-card animate-fade-up">
      <div class="auth-logo" style="margin-bottom:1.8rem;">
        <div class="logo-icon">🚌</div>
        <h1>Create Account</h1>
        <p>Join BusPass Pro and go digital today</p>
      </div>

      <form method="POST" enctype="multipart/form-data">
        <div class="field-grid">
          <div class="form-group">
            <label class="form-label">👤 Full Name</label>
            <input type="text" name="full_name" class="form-control" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label class="form-label">📧 Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="form-group">
            <label class="form-label">📞 Phone Number</label>
            <input type="tel" name="phone" id="phone" class="form-control" required />
            <div id="phone-error" style="color:var(--danger); font-size:0.75rem; margin-top:4px; display:none;">Invalid phone number</div>
          </div>
          <div class="form-group">
            <label class="form-label">📷 Profile Photo</label>
            <label class="photo-upload-label" for="photo">
              <span class="upload-icon">📷</span>
              <span id="photoName">Click to upload photo</span>
            </label>
            <input type="file" name="photo" id="photo" accept="image/*" required
              onchange="document.getElementById('photoName').textContent = this.files[0]?.name || 'Click to upload photo'" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">🏠 Address</label>
          <textarea name="address" class="form-control" rows="2" placeholder="Enter your full address" required></textarea>
        </div>

        <div class="field-grid">
          <div class="form-group">
            <label class="form-label">🏷️ Category</label>
            <select name="category" id="categorySelect" class="form-control" onchange="updateDocHint()">
              <option>Student</option>
              <option>Employee</option>
              <option>Senior Citizen</option>
              <option>General</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">🔐 Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create a password" required />
          </div>
        </div>

        <!-- Document Upload (optional at registration) -->
        <div class="form-group">
          <label class="form-label">
            📄 Proof Document
            <span style="font-size:0.74rem; color:var(--text-muted); font-weight:400; margin-left:6px;">(Optional — can upload later from Profile)</span>
          </label>
          <div id="docHint" style="font-size:0.78rem; color:var(--text-muted); background:rgba(255,255,255,0.03); border-radius:var(--radius-sm); padding:8px 12px; margin-bottom:8px; border:1px solid var(--glass-border);">
            💡 <strong>Student</strong> — Upload your College/School ID card or admission letter.
          </div>
          <label class="photo-upload-label" for="doc_file" id="docUploadLabel">
            <span class="upload-icon">📎</span>
            <span id="docFileName">Click to upload PDF, PNG, or JPG (max 5MB)</span>
          </label>
          <input type="file" name="doc_file" id="doc_file" accept=".pdf,.png,.jpg,.jpeg,.webp"
            style="display:none;"
            onchange="document.getElementById('docFileName').textContent = this.files[0]?.name || 'Click to upload'; document.getElementById('docUploadLabel').style.borderColor='var(--accent)';" />
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
          ✨ Create Account
        </button>
      </form>

      <div class="text-center" style="margin-top:1.2rem; color: var(--text-secondary); font-size:0.9rem;">
        Already have an account?
        <a href="/login" style="color: var(--accent); font-weight:600; margin-left:4px;">Sign In →</a>
      </div>
    </div>
  </div>
  <script src="/static/toast.js"></script>
  <script src="/static/toast.js"></script>
  
  <!-- intl-tel-input library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>
  
  <style>
    /* Fix intl-tel-input styling inside our dark theme */
    .iti { width: 100%; }
    .iti__country-list { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); }
    .iti__country-list .iti__country.iti__highlight { background: rgba(255,255,255,0.05); }
    .iti__search-input { background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); }
    .iti__flag-container { padding: 2px; }
  </style>

  <script>
    const phoneInput = document.querySelector("#phone");
    const errorMsg = document.querySelector("#phone-error");
    const form = document.querySelector("form");

    // Initialize the library
    const iti = window.intlTelInput(phoneInput, {
      initialCountry: "auto",
      geoIpLookup: callback => {
        fetch("https://ipapi.co/json")
          .then(res => res.json())
          .then(data => callback(data.country_code))
          .catch(() => callback("in")); // Default to India if lookup fails
      },
      utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js",
      strictMode: true,
      separateDialCode: true,
    });

    // Validate on form submit
    form.addEventListener("submit", function(e) {
      if (phoneInput.value.trim() && !iti.isValidNumber()) {
        e.preventDefault(); // Stop submission
        errorMsg.style.display = "block";
        phoneInput.style.borderColor = "var(--danger)";
      } else {
        errorMsg.style.display = "none";
        // Set the hidden full number to be submitted
        phoneInput.value = iti.getNumber();
      }
    });

    // Reset error on type
    phoneInput.addEventListener('input', () => {
      errorMsg.style.display = "none";
      phoneInput.style.borderColor = "rgba(255, 255, 255, 0.15)";
    });

    // Dynamic document hint based on selected category
    const hints = {
      'Student':        '💡 <strong>Student</strong> — Upload your College/School ID card or admission letter.',
      'Employee':       '💡 <strong>Employee</strong> — Upload your Company ID card or appointment letter.',
      'Senior Citizen': '💡 <strong>Senior Citizen</strong> — Upload your Aadhaar card or Senior Citizen card.',
      'General':        '💡 <strong>General</strong> — Upload any valid government-issued ID (Aadhaar, PAN, Voter ID).',
    };
    function updateDocHint() {
      const cat = document.getElementById('categorySelect').value;
      document.getElementById('docHint').innerHTML = hints[cat] || hints['General'];
    }
  </script>
</body>
</html>
