<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BusPass Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0" />
  <style>
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(100px); opacity: 0.12; z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -200px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #ef4444; bottom: -150px; right: -100px; }
    .auth-card { position: relative; z-index: 1; }
    .divider { display:flex; align-items:center; gap:12px; margin:1.2rem 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--glass-border); }
    .divider span { color:var(--text-muted); font-size:0.78rem; }
    .warn-note {
      margin-top: 1.25rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #f87171;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card animate-fade-up">
      <div class="auth-logo">
        <div class="logo-icon" style="background: linear-gradient(135deg, #7c3aed, #ef4444);">🛡️</div>
        <h1>Admin Portal</h1>
        <p>Restricted access — authorized personnel only</p>
      </div>

      <form method="POST">
        <div class="form-group">
          <label class="form-label">👤 Username</label>
          <input type="text" name="username" class="form-control"
            placeholder="Admin username" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">🔐 Password</label>
          <input type="password" name="password" class="form-control"
            placeholder="Admin password" required />
        </div>

        <button type="submit" class="btn btn-block btn-lg"
          style="background: linear-gradient(135deg, #7c3aed, #ef4444); color: #fff;
                 box-shadow: 0 4px 20px rgba(124,58,237,0.35); margin-top: 0.25rem;">
          🔓 Sign In
        </button>
      </form>

      <div class="warn-note">
        ⚠️ Unauthorized access is strictly prohibited and may be subject to legal action.
      </div>

      <div class="text-center" style="margin-top:1.25rem;">
        <a href="/login" style="color:var(--text-muted); font-size:0.82rem;">← Back to User Login</a>
      </div>
    </div>
  </div>
  <script src="/static/toast.js"></script>
  <script src="/static/theme.js"></script>
</body>
</html>
